name: Auto Update llama.cpp

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llama-cpp-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Resolve current and latest release tags
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          current_tag="$(cat .llama_cpp_version 2>/dev/null || true)"
          latest_tag="$(curl -fsSL https://api.github.com/repos/ggml-org/llama.cpp/releases/latest | jq -r '.tag_name')"

          if [[ -z "${latest_tag}" || "${latest_tag}" == "null" ]]; then
            echo "Unable to determine latest llama.cpp release tag"
            exit 1
          fi

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

          if [[ "${current_tag}" == "${latest_tag}" ]]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update vendored llama.cpp
        if: steps.versions.outputs.needs_update == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="${{ steps.versions.outputs.latest_tag }}"
          today_iso="$(date -u +%Y-%m-%d)"

          curl -fsSL "https://github.com/ggml-org/llama.cpp/archive/refs/tags/${latest_tag}.zip" -o llama.zip
          unzip -q llama.zip

          rm -rf android/src/main/cpp/llama.cpp
          mv "llama.cpp-${latest_tag}" android/src/main/cpp/llama.cpp

          echo "${latest_tag}" > .llama_cpp_version

          {
            echo "# Llama.cpp Update Notes (${latest_tag})"
            echo
            echo "Date: ${today_iso}"
            echo "Upstream tag: ${latest_tag}"
            echo
            echo "Summary"
            echo "- Vendored llama.cpp updated automatically by GitHub Actions."
          } > "docs/llama_cpp_update_${today_iso}.md"

      - name: Create Pull Request
        if: steps.versions.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump vendored llama.cpp to ${{ steps.versions.outputs.latest_tag }}"
          title: "chore: bump llama.cpp to ${{ steps.versions.outputs.latest_tag }}"
          body: |
            Automated llama.cpp vendor update.

            - Previous: `${{ steps.versions.outputs.current_tag }}`
            - Latest: `${{ steps.versions.outputs.latest_tag }}`
            - Updated directory: `android/src/main/cpp/llama.cpp`
            - Updated marker: `.llama_cpp_version`
          branch: "automation/llama-cpp-${{ steps.versions.outputs.latest_tag }}"
          base: dev
          labels: |
            dependencies
            automation
